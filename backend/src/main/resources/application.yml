# =============================================================================
# Spring Boot configuration for the stock price tracker.
# Values can be overridden through environment variables (12-factor friendly).
# =============================================================================
spring:
  application:
    name: stock-tracker-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/stock_tracker}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:1373174861yuhang}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # Use "update" for local dev; switch to "validate" + Flyway/Liquibase in prod.
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  # ---------------------------------------------------------------------------
  # SMTP — only consulted when app.notification.channel=email.
  # Gmail defaults shown here; any SMTP server works.
  # For Gmail you MUST use an App Password (16-char), not your account password.
  # See README.
  # ---------------------------------------------------------------------------
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  port: ${SERVER_PORT:8080}

# -----------------------------------------------------------------------------
# Application-specific properties
# -----------------------------------------------------------------------------
app:
  jwt:
    # 256-bit base64 secret. ALWAYS override in production via env var.
    secret: ${JWT_SECRET:ZmFrZS1kZXYtc2VjcmV0LWNoYW5nZS1tZS1pbi1wcm9kdWN0aW9uLWVudg==}
    # Token lifetime in milliseconds (24h).
    expiration-ms: 86400000

  scheduler:
    # How often to poll prices (5 minutes by default).
    price-check-cron: "0 */5 * * * *"
    # Cool-down so a single user is not spammed with alerts.
    notification-cooldown-minutes: 60

  notification:
    # "log"   => write the alert to the application log (default, zero setup)
    # "email" => deliver via SMTP using spring.mail.* settings above
    channel: ${NOTIFICATION_CHANNEL:log}
    email:
      # "From" address shown on outgoing emails. For Gmail this MUST be the
      # same as spring.mail.username, otherwise Google rewrites the header.
      from: ${NOTIFICATION_EMAIL_FROM:${MAIL_USERNAME:no-reply@example.com}}

logging:
  level:
    com.stocktracker: INFO
    org.springframework.security: INFO
