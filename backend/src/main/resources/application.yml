# =============================================================================
# Spring Boot configuration for the stock price tracker.
# Values can be overridden through environment variables (12-factor friendly).
# =============================================================================
spring:
  application:
    name: stock-tracker-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/stock_tracker}
    username: ${DB_USERNAME:postgres}
    # NOTE: no fallback by design — the app refuses to start without DB_PASSWORD
    # in the environment. Never commit the real password back into this file.
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # Use "update" for local dev; switch to "validate" + Flyway/Liquibase in prod.
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  # ---------------------------------------------------------------------------
  # SMTP — only consulted when app.notification.channel=email.
  # Gmail defaults shown here; any SMTP server works.
  # For Gmail you MUST use an App Password (16-char), not your account password.
  # See README.
  # ---------------------------------------------------------------------------
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  port: ${SERVER_PORT:8080}

# -----------------------------------------------------------------------------
# Application-specific properties
# -----------------------------------------------------------------------------
app:
  jwt:
    # 256-bit (or larger) base64 secret. NO fallback by design — the app refuses
    # to start without JWT_SECRET in the environment so we can never accidentally
    # ship a known, public secret to production.
    secret: ${JWT_SECRET}
    # Token lifetime in milliseconds (24h).
    expiration-ms: 86400000

  scheduler:
    # How often to poll prices (5 minutes by default).
    price-check-cron: "0 */5 * * * *"
    # Cool-down so a single user is not spammed with alerts.
    notification-cooldown-minutes: 60

  # ---------------------------------------------------------------------------
  # Stock price provider
  #   "yahoo" => real prices from Yahoo Finance v8 chart API (default,
  #              no API key, browser User-Agent + short cache to be polite).
  #   "mock"  => deterministic random walk for offline/dev work.
  # ---------------------------------------------------------------------------
  stock:
    provider: ${STOCK_PROVIDER:yahoo}
    yahoo:
      base-url: ${YAHOO_BASE_URL:https://query1.finance.yahoo.com}

  notification:
    # "log"   => write the alert to the application log (default, zero setup)
    # "email" => deliver via SMTP using spring.mail.* settings above
    channel: ${NOTIFICATION_CHANNEL:log}
    email:
      # "From" address shown on outgoing emails. For Gmail this MUST be the
      # same as spring.mail.username, otherwise Google rewrites the header.
      from: ${NOTIFICATION_EMAIL_FROM:${MAIL_USERNAME:no-reply@example.com}}

  # ---------------------------------------------------------------------------
  # CORS allowed origin patterns. Vite emits ES-module <script> tags, which
  # browsers fetch in CORS mode and therefore send an Origin header even when
  # the SPA is bundled into the same jar — so the production hostname has to
  # be on this list, not just dev origins.
  #
  # Defaults cover the two React dev servers and any *.trycloudflare.com
  # quick tunnel. Add your permanent domain by setting
  #     APP_CORS_ORIGINS=http://localhost:5173,https://stocks.example.com
  # in .env (comma-separated, no spaces).
  # ---------------------------------------------------------------------------
  cors:
    allowed-origin-patterns: ${APP_CORS_ORIGINS:http://localhost:3000,http://localhost:5173,https://*.trycloudflare.com}

logging:
  level:
    com.stocktracker: INFO
    org.springframework.security: INFO
